name: CI

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v2.2.0)'
        required: false
        default: 'dev-build'

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: ampere-ada-rtx-30-40
            arch: "8.0;8.6;8.9"
            suffix: ampere.ada.rtx30.40
          - name: hopper-h100-h200
            arch: "9.0"
            suffix: hopper.h100.h200
          - name: blackwell-rtx-50
            arch: "10.0+PTX"
            suffix: blackwell.rtx50
    container:
      image: nvidia/cuda:13.0.0-devel-ubuntu24.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python 3.12
        run: |
          apt-get update
          apt-get install -y python3.12 python3.12-dev
          echo "Looking for EXTERNALLY-MANAGED files..."
          find /usr/lib/python3* -name EXTERNALLY-MANAGED
          echo "Deleting matches..."
          find /usr/lib/python3* -name EXTERNALLY-MANAGED -delete || true
          apt-get install -y python3-pip
          
          update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.12 1

      - name: Install Build Dependencies
        run: |
          # Use local index or PyPI for torch 2.11
          python3 -m pip install torch==2.11.0 --index-url https://download.pytorch.org/whl/cu130
          python3 -m pip install wheel setuptools packaging ninja

      - name: Build Package (Wheels and Source Dist)
        env:
          TORCH_CUDA_ARCH_LIST: ${{ matrix.arch }}
          SAGEATTN_VERSION_SUFFIX: ${{ matrix.suffix }}
          MAX_JOBS: 1
          NVCC_THREADS: 1
        run: |
          python3 setup.py sdist
          python3 setup.py bdist_wheel

      - name: Attest Build Provenance
        uses: actions/attest@v4
        with:
          subject-path: 'dist/*'

      - name: Create Release and Upload Assets
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          generate_release_notes: true
